<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitácora CEFI | FQ</title>
    <link rel="icon" type="image/png" href="https://example.com/favicon.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-brand">
                <div class="brand-icon">
                    <i data-lucide="flask-conical"></i>
                </div>
                <div class="brand-text">
                    <h1>Bitácora</h1>
                    <span>CEFI | FQ</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="date-display">
                    <i data-lucide="calendar-days"></i>
                    <span id="current-date"></span>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="form-card">
                <div class="card-header">
                    <div class="header-icon">
                        <i data-lucide="clipboard-pen"></i>
                    </div>
                    <div class="header-content">
                        <h2>Nuevo Registro</h2>
                        <p>Ingrese los datos del equipo</p>
                    </div>
                    <div class="step-indicator">1</div>
                </div>

                <form class="form-body">
                    <div class="form-row">
                        <div class="form-field">
                            <label for="name">
                                <i data-lucide="user"></i>
                                Nombre completo
                            </label>
                            <div class="input-wrapper">
                                <input type="text" id="name" placeholder="Ingrese su nombre">
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="lab">
                                <i data-lucide="building"></i>
                                Laboratorio
                            </label>
                            <div class="input-wrapper">
                                <input type="text" id="lab" placeholder="Nombre del laboratorio">
                            </div>
                        </div>
                    </div>

                    <div class="form-field">
                        <label for="equipment">
                            <i data-lucide="scan-line"></i>
                            Equipo
                        </label>
                        <div class="input-wrapper">
                            <select id="equipment" onchange="equipmentComments()">
                                <option value="">Seleccione un equipo</option>
                                <option value="HPLC">HPLC</option>
                                <option value="UHPLC">UHPLC</option>
                                <option value="UHPLC-MS">UHPLC-MS</option>
                                <option value="GC">GC</option>
                                <option value="UV">UV</option>
                                <option value="FTIR">FTIR</option>
                                <option value="NMR">NMR</option>
                                <option value="TOC">TOC</option>
                                <option value="EXRF">EXRF</option>
                                <option value="Cuba electroforesis">Cuba electroforesis</option>
                                <option value="Documentador de geles">Documentador de geles</option>
                                <option value="Transiluminador">Transiluminador</option>
                                <option value="Transiluminador UV">Transiluminador UV</option>
                                <option value="Potenciostato">Potenciostato</option>
                                <option value="Lector de microplacas">Lector de microplacas</option>
                                <option value="PCR">PCR</option>
                                <option value="Titulador automático">Titulador automático</option>
                                <option value="<Microscopio electronico de barrido (SEM)">Microscopio electrónico de barrido (SEM)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row triple">
                        <div class="form-field">
                            <label for="date">
                                <i data-lucide="calendar"></i>
                                Fecha
                            </label>
                            <div class="input-wrapper">
                                <input type="date" id="date">
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="startTime">
                                <i data-lucide="play"></i>
                                Hora inicio
                            </label>
                            <div class="input-wrapper">
                                <input type="time" id="startTime">
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="endTime">
                                <i data-lucide="stop-circle"></i>
                                Hora fin
                            </label>
                            <div class="input-wrapper">
                                <input type="time" id="endTime">
                            </div>
                        </div>
                    </div>

                    <div class="toggle-section">
                        <div class="toggle-item">
                            <div class="toggle-content">
                                <i data-lucide="package-check"></i>
                                <span>Recibió en buen estado</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="recived">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-item">
                            <div class="toggle-content">
                                <i data-lucide="package-plus"></i>
                                <span>Devolvió en buen estado</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="returned">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="form-field">
                        <label for="comments" id="required-comments">
                            <i data-lucide="message-square"></i>
                            Comentarios
                        </label>
                        <div class="input-wrapper">
                            <textarea id="comments" placeholder="Comentarios adicionales..."></textarea>
                        </div>
                    </div>

                    <button type="button" class="submit-btn" onclick="formVerification()">
                        <i data-lucide="save"></i>
                        Guardar Registro
                    </button>
                </form>
            </div>

            <div class="table-card">
                <div class="card-header">
                    <div class="header-icon">
                        <i data-lucide="history"></i>
                    </div>
                    <div class="header-content">
                        <h2>Registros</h2>
                        <p>Historial de bitácoras</p>
                    </div>
                    <div class="step-indicator">2</div>
                </div>

                <div class="filter-bar">
                    <div class="filter-select">
                        <i data-lucide="filter"></i>
                        <select id="slt-equipment">
                            <option value="">Todos los equipos</option>
                            <option value="HPLC">HPLC</option>
                            <option value="UHPLC">UHPLC</option>
                            <option value="UHPLC-MS">UHPLC-MS</option>
                            <option value="GC">GC</option>
                            <option value="UV">UV</option>
                            <option value="FTIR">FTIR</option>
                            <option value="NMR">NMR</option>
                            <option value="TOC">TOC</option>
                            <option value="EXRF">EXRF</option>
                            <option value="Cuba electroforesis">Cuba electroforesis</option>
                            <option value="Documentador de geles">Documentador de geles</option>
                            <option value="Transiluminador">Transiluminador</option>
                            <option value="Transiluminador UV">Transiluminador UV</option>
                            <option value="Potenciostato">Potenciostato</option>
                            <option value="Lector de microplacas">Lector de microplacas</option>
                            <option value="PCR">PCR</option>
                            <option value="Titulador automático">Titulador automático</option>
                            <option value="<Microscopio electronico de barrido (SEM)">Microscopio electrónico de barrido (SEM)</option>
                        </select>
                    </div>
                    <button type="button" class="filter-btn" onclick="loadLogsTable()">
                        <i data-lucide="search"></i>
                        Buscar
                    </button>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Laboratorio</th>
                            <th>Equipo</th>
                            <th>Fecha</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-logs"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-ES', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        const equipmentComments = () => {
            let selected = document.getElementById("equipment").value;
            let title = document.getElementById("required-comments");
            if (selected == "HPLC" || selected == "UHPLC" || selected == "UHPLC-MS")
                title.innerHTML = '<i data-lucide="message-square"></i> Comentarios<span class="required">*</span>';
            else title.innerHTML = '<i data-lucide="message-square"></i> Comentarios';
            lucide.createIcons();
        };

        const formVerification = () => {
            let name = document.getElementById("name").value;
            let lab = document.getElementById("lab").value;
            let equipment = document.getElementById("equipment").value;
            let date = document.getElementById("date").value;
            let startTime = document.getElementById("startTime").value;
            let endTime = document.getElementById("endTime").value;
            let recived = document.getElementById("recived").checked;
            let returned = document.getElementById("returned").checked;
            let comments = document.getElementById("comments").value;

            let form = {
                name: name,
                lab: lab,
                equipment: equipment,
                comments: comments,
                startDateTime: new Date(`${date}T${startTime}`).getTime(),
                endDateTime: endTime ? new Date(`${date}T${endTime}`).getTime() : null,
                received: recived,
                returned: returned,
            };

            verifyMandatoryFields(form) ? submitForm(form) : alert("Ingreso incorrecto, revise campos");
        };

        const cleanFieldsOnSuccess = () => {
            document.getElementById("name").value = "";
            document.getElementById("lab").value = "";
            document.getElementById("equipment").value = "";
            document.getElementById("date").value = "";
            document.getElementById("startTime").value = "";
            document.getElementById("endTime").value = "";
            document.getElementById("recived").checked = false;
            document.getElementById("returned").checked = false;
            document.getElementById("comments").value = "";
        };

        const verifyMandatoryFields = (form) => {
            if (form.startDateTime == "Invalid Date" || isNaN(form.startDateTime)) {
                alert("Ingrese una fecha y hora de inicio válidas");
                return false;
            }
            if (form.equipment == "") {
                alert("Seleccione un equipo");
                return false;
            }
            if (form.name == "") {
                alert("Ingrese su nombre");
                return false;
            }
            if (form.lab == "") {
                alert("Ingrese un laboratorio");
                return false;
            }
            if (form.equipment == "HPLC" || form.equipment == "UHPLC" || form.equipment == "UHPLC-MS") {
                if (form.comments == "") {
                    alert("Debe ingresar un comentario");
                    return false;
                }
            }
            return true;
        };

        const submitForm = (form) => {
            fetch("/records/add", {
                headers: { "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify(form),
            }).then((incoming) => {
                incoming.status != 201
                    ? error(incoming)
                    : (alert("Ingresado exitosamente"), cleanFieldsOnSuccess());
            });
        };

        const error = (data) => {
            alert("Error al ingresar");
        };

        const loadLogsTable = async () => {
            let table = document.getElementById("tbody-logs");
            let equipment = document.getElementById("slt-equipment").value;
            const response = await fetch(`/records/machine?type=${equipment}`, { method: "GET" })
                .then((response) => response.json())
                .then((data) => data);
            table.innerHTML = "";
            if (response.count != 0 || response.count != null) {
                for (let i = 0; i < response.length; i++) {
                    date = new Date(response[i].StartDateTime).toLocaleDateString().split("/");
                    table.innerHTML += `
                        <tr>
                            <td><div class="user-cell">${response[i].Name}</div></td>
                            <td>${response[i].Lab}</td>
                            <td><span class="equipment-tag">${response[i].Equipment}</span></td>
                            <td>${date[1]}/${date[0]}/${date[2]}</td>
                            <td><a href="/records/open?id=${response[i].ID}" class="view-btn"><i data-lucide="eye"></i> Ver</a></td>
                        </tr>
                    `;
                }
                lucide.createIcons();
            }
        };
    </script>
</body>

<style>
    :root {
        --primary: #6366f1;
        --primary-light: #818cf8;
        --primary-dark: #4f46e5;
        --bg: #f8fafc;
        --surface: #ffffff;
        --surface-alt: #f1f5f9;
        --text: #1e293b;
        --text-light: #64748b;
        --success: #10b981;
        --danger: #ef4444;
        --border: #e2e8f0;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
    }

    .page-wrapper {
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding: 1.5rem 2rem;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        border-radius: 20px;
        color: white;
        box-shadow: var(--shadow);
    }

    .header-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .brand-icon {
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .brand-icon i {
        width: 28px;
        height: 28px;
    }

    .brand-text h1 {
        font-size: 1.75rem;
        font-weight: 700;
    }

    .brand-text span {
        font-size: 0.9rem;
        opacity: 0.85;
    }

    .date-display {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        opacity: 0.9;
    }

    .main {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .form-card, .table-card {
        background: var(--surface);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
    }

    .card-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem 2rem;
        background: var(--surface-alt);
        border-bottom: 1px solid var(--border);
    }

    .header-icon {
        width: 48px;
        height: 48px;
        background: var(--primary);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }

    .header-content {
        flex: 1;
    }

    .header-content h2 {
        font-size: 1.25rem;
        font-weight: 600;
    }

    .header-content p {
        font-size: 0.875rem;
        color: var(--text-light);
    }

    .step-indicator {
        width: 36px;
        height: 36px;
        background: var(--border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.9rem;
    }

    .form-body {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
    }

    .form-row.triple {
        grid-template-columns: repeat(3, 1fr);
    }

    .form-field {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-field label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-light);
    }

    .input-wrapper input, 
    .input-wrapper select,
    .input-wrapper textarea {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.2s;
        background: var(--surface);
        color: var(--text);
    }

    .input-wrapper input:focus,
    .input-wrapper select:focus,
    .input-wrapper textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .input-wrapper textarea {
        min-height: 100px;
        resize: vertical;
    }

    .toggle-section {
        display: flex;
        gap: 1.5rem;
        padding: 1rem;
        background: var(--surface-alt);
        border-radius: 12px;
        justify-content: center;
    }

    .toggle-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .toggle-content {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
    }

    .toggle-switch {
        position: relative;
        width: 48px;
        height: 26px;
    }

    .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .toggle-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: var(--border);
        border-radius: 26px;
        transition: 0.3s;
    }

    .toggle-slider::before {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider {
        background: var(--success);
    }

    .toggle-switch input:checked + .toggle-slider::before {
        transform: translateX(22px);
    }

    .submit-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 1rem 2rem;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    .filter-bar {
        display: flex;
        gap: 1rem;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--border);
    }

    .filter-select {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0 1rem;
        border: 2px solid var(--border);
        border-radius: 12px;
    }

    .filter-select select {
        flex: 1;
        border: none;
        background: transparent;
        padding: 0.75rem 0;
        font-family: inherit;
    }

    .filter-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: var(--surface-alt);
        border: 2px solid var(--border);
        border-radius: 12px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
    }

    .filter-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
    }

    .data-table th {
        padding: 1rem 2rem;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-light);
        background: var(--surface-alt);
    }

    .data-table td {
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
    }

    .data-table tbody tr:hover {
        background: var(--surface-alt);
    }

    .user-cell {
        font-weight: 500;
    }

    .equipment-tag {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(99, 102, 241, 0.05));
        color: var(--primary-dark);
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
    }

    .view-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.5rem 0.75rem;
        background: var(--surface-alt);
        border-radius: 8px;
        color: var(--text-light);
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.2s;
    }

    .view-btn:hover {
        background: var(--primary);
        color: white;
    }

    .required {
        color: var(--danger);
    }

    @media (max-width: 768px) {
        .form-row, .form-row.triple {
            grid-template-columns: 1fr;
        }
        .toggle-section {
            flex-direction: column;
        }
    }
</style>

</html>
